<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Foxglove — Tall Spike — Tier 2 Flower -->

  <!-- Main tall spike stem -->
  <path d="M50 90 C50 85 50 70 50 15" stroke="#4A3520" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Side leaf stems -->
  <path d="M50 82 C42 80 35 82 30 86" stroke="#5C8A4A" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 75 C58 73 65 75 70 79" stroke="#5C8A4A" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 68 C42 66 35 66 31 70" stroke="#5C8A4A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 62 C58 60 65 60 69 64" stroke="#5C8A4A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Big basal leaves -->
  <path d="M50 82 C42 79 33 78 30 84 C34 80 43 80 50 82Z" fill="#5C8A4A"/>
  <path d="M30 84 C31 81 35 80 37 83Z" fill="#4A7A3A" opacity="0.7"/>
  <path d="M50 75 C58 72 66 72 70 77 C66 74 58 74 50 75Z" fill="#6B9B4A"/>
  <path d="M50 68 C42 65 34 64 31 68 C35 65 43 66 50 68Z" fill="#5C8A4A"/>
  <path d="M50 62 C58 59 65 59 69 63 C65 61 58 61 50 62Z" fill="#6B9B4A"/>
  <!-- Leaf vein marks -->
  <path d="M30 84 L40 81 L50 82" stroke="#4A7A3A" stroke-width="0.7" opacity="0.5"/>
  <path d="M70 77 L60 74 L50 75" stroke="#4A7A3A" stroke-width="0.7" opacity="0.5"/>

  <!-- Bell flowers hanging from spike (small pedicels) -->
  <!-- Flowers stagger left-right alternating -->
  <!-- Lowest flower (largest, most open) -->
  <path d="M50 72 L42 70" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M42 70 C38 68 34 66 35 62 C36 59 40 58 43 60 C40 60 38 63 38 66 C38 68 40 70 42 70Z" fill="#D4847A"/>
  <path d="M42 70 C39 68 37 66 37 63 C37 60 40 59 42 61Z" fill="#B86060"/>
  <circle cx="39" cy="64" r="1" fill="#F0C0B0" opacity="0.7"/>
  <circle cx="41" cy="63" r="0.8" fill="#F0C0B0" opacity="0.7"/>
  <!-- Spotted interior dots (foxglove characteristic) -->
  <circle cx="39" cy="66" r="0.7" fill="#8B3040" opacity="0.6"/>
  <circle cx="41" cy="65" r="0.7" fill="#8B3040" opacity="0.6"/>

  <!-- Second flower -->
  <path d="M50 65 L58 63" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M58 63 C62 61 66 59 65 55 C64 52 60 51 57 53 C60 53 62 56 62 59 C62 61 60 63 58 63Z" fill="#D4847A"/>
  <path d="M58 63 C61 61 63 59 63 56 C63 53 60 52 58 54Z" fill="#B86060"/>
  <circle cx="62" cy="57" r="0.7" fill="#8B3040" opacity="0.6"/>
  <circle cx="60" cy="56" r="0.7" fill="#8B3040" opacity="0.6"/>

  <!-- Third flower -->
  <path d="M50 58 L43 56" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M43 56 C39 54 35 52 36 48 C37 45 41 44 44 46 C41 46 39 49 39 52 C39 54 41 56 43 56Z" fill="#E8A090"/>
  <circle cx="40" cy="50" r="0.7" fill="#8B3040" opacity="0.6"/>
  <circle cx="42" cy="49" r="0.7" fill="#8B3040" opacity="0.6"/>

  <!-- Fourth flower -->
  <path d="M50 51 L57 49" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M57 49 C61 47 65 45 64 41 C63 38 59 37 56 39 C59 39 61 42 61 45 C61 47 59 49 57 49Z" fill="#E8A090"/>
  <circle cx="62" cy="43" r="0.6" fill="#8B3040" opacity="0.6"/>
  <circle cx="60" cy="42" r="0.6" fill="#8B3040" opacity="0.6"/>

  <!-- Fifth flower (smaller, opening) -->
  <path d="M50 44 L44 42" stroke="#8B5C30" stroke-width="1" stroke-linecap="round"/>
  <path d="M44 42 C41 40 38 38 39 35 C40 32 43 32 45 34 C43 34 41 36 41 39 C41 41 42 42 44 42Z" fill="#F0B0A0"/>

  <!-- Sixth flower (bud-like) -->
  <path d="M50 38 L55 36" stroke="#8B5C30" stroke-width="1" stroke-linecap="round"/>
  <path d="M55 36 C57 34 60 33 60 30 C60 28 57 27 55 29 C57 29 58 31 58 33 C58 35 56 36 55 36Z" fill="#F0B8A8"/>

  <!-- Buds at tip (teardrop shapes) -->
  <path d="M50 32 L47 30" stroke="#8B5C30" stroke-width="1" stroke-linecap="round"/>
  <path d="M47 30 C45 28 44 25 46 23 C47 22 48 23 47 25 C47 27 47 29 47 30Z" fill="#D4847A"/>
  <ellipse cx="46" cy="23" rx="2" ry="2.5" fill="#6B9B4A"/>

  <path d="M50 27 L52 25" stroke="#8B5C30" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="52" cy="23" rx="2" ry="2.5" fill="#6B9B4A"/>
  <ellipse cx="52" cy="22" rx="1.5" ry="2" fill="#D4847A"/>

  <!-- Top tip buds -->
  <ellipse cx="50" cy="20" rx="2" ry="3" fill="#6B9B4A"/>
  <ellipse cx="50" cy="18" rx="1.5" ry="2" fill="#E8A090"/>
  <ellipse cx="50" cy="15" rx="1.2" ry="1.8" fill="#6B9B4A"/>

  <!-- Ground soil -->
  <ellipse cx="50" cy="91" rx="11" ry="3" fill="#8B6914" opacity="0.3"/>
</svg>
