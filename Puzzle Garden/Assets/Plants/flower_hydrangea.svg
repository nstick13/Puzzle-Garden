    <path d="M66 46 C64 44 64 41 66 40 C68 41 68 44 66 46Z" fill="#9AAAC0"/>
    <path d="M66 46 C68 48 71 48 72 46 C71 48 68 48 66 46Z" fill="#8A9AB0"/>
    <path d="M66 46 C64 48 62 47 62 46 C62 45 64 44 66 46Z" fill="#9AAAC0"/>
