  <path d="M50 68 C44 63 40 57 38 52" stroke="#5C8A4A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 68 C56 63 60 57 62 52" stroke="#5C8A4A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Side leaf stems -->
