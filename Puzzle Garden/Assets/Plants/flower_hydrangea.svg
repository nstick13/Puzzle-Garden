    <path d="M58 55 C60 57 63 57 64 55 C63 57 60 57 58 55Z" fill="#7A9AC8"/>
    <path d="M58 55 C56 57 54 56 54 55 C54 54 56 53 58 55Z" fill="#8AAAD8"/>
