    <path d="M42 55 C40 53 40 50 42 49 C44 50 44 53 42 55Z" fill="#8AAAD8"/>
    <path d="M42 55 C44 57 47 57 48 55 C47 57 44 57 42 55Z" fill="#7A9AC8"/>
    <path d="M42 55 C40 57 38 56 38 55 C38 54 40 53 42 55Z" fill="#8AAAD8"/>
