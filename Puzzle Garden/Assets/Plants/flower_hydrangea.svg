  <path d="M36 83 L44 80" stroke="#4A7A3A" stroke-width="0.6" opacity="0.4"/>
  <path d="M70 78 L60 75 L50 76" stroke="#4A7A3A" stroke-width="0.8" opacity="0.5"/>

