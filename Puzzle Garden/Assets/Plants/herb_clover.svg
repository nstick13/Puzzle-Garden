  <circle cx="58" cy="52" r="5" fill="#D89898"/>
  <circle cx="58" cy="52" r="3.5" fill="#E8A89A"/>
  <circle cx="56" cy="51" r="0.8" fill="#C88080" opacity="0.8"/>
  <circle cx="58" cy="50" r="0.8" fill="#C88080" opacity="0.8"/>
  <circle cx="60" cy="51" r="0.8" fill="#C88080" opacity="0.8"/>
  <circle cx="58" cy="53" r="0.8" fill="#C88080" opacity="0.8"/>

