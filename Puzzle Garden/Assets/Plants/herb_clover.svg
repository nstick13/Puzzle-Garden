  <circle cx="53" cy="46" r="1.2" fill="#E09090" opacity="0.8"/>
  <circle cx="50" cy="45" r="1.5" fill="#F8D8D0"/>

  <!-- Left flower -->
  <circle cx="42" cy="55" r="5" fill="#E8A89A"/>
  <circle cx="42" cy="55" r="3.5" fill="#F0B8AA"/>
  <circle cx="40" cy="54" r="0.8" fill="#E09090" opacity="0.8"/>
  <circle cx="42" cy="53" r="0.8" fill="#E09090" opacity="0.8"/>
  <circle cx="44" cy="54" r="0.8" fill="#E09090" opacity="0.8"/>
  <circle cx="42" cy="56" r="0.8" fill="#E09090" opacity="0.8"/>

