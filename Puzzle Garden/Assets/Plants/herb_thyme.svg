<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Thyme / Creeping Herb — Tier 1 Herb -->

  <!-- Low, spreading woody stems -->
  <path d="M50 85 C45 82 38 78 28 75" stroke="#8B5C30" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 85 C55 82 62 78 72 75" stroke="#8B5C30" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 85 C48 78 45 70 42 62" stroke="#8B5C30" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 85 C52 78 55 70 58 62" stroke="#8B5C30" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 85 C47 80 42 75 35 72" stroke="#8B5C30" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 85 C53 80 58 75 65 72" stroke="#8B5C30" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small sub-branches -->
  <path d="M38 78 C35 74 30 72 26 74" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M62 78 C65 74 70 72 74 74" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M44 72 C40 68 36 66 33 68" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M56 72 C60 68 64 66 67 68" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M42 64 C38 62 34 63 32 66" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M58 64 C62 62 66 63 68 66" stroke="#8B5C30" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Tiny oval leaves — scattered densely -->
  <!-- Along left main branch -->
  <ellipse cx="40" cy="78" rx="3" ry="1.8" fill="#6B8B3A" transform="rotate(-20,40,78)"/>
  <ellipse cx="35" cy="76" rx="3" ry="1.8" fill="#7A9B48" transform="rotate(-30,35,76)"/>
  <ellipse cx="30" cy="74" rx="2.5" ry="1.6" fill="#6B8B3A" transform="rotate(-20,30,74)"/>
  <ellipse cx="26" cy="73" rx="2.5" ry="1.5" fill="#7A9B48" transform="rotate(-10,26,73)"/>
  <!-- Along right main branch -->
  <ellipse cx="60" cy="78" rx="3" ry="1.8" fill="#6B8B3A" transform="rotate(20,60,78)"/>
  <ellipse cx="65" cy="76" rx="3" ry="1.8" fill="#7A9B48" transform="rotate(30,65,76)"/>
  <ellipse cx="70" cy="74" rx="2.5" ry="1.6" fill="#6B8B3A" transform="rotate(20,70,74)"/>
  <ellipse cx="74" cy="73" rx="2.5" ry="1.5" fill="#7A9B48" transform="rotate(10,74,73)"/>
  <!-- Left sub -->
  <ellipse cx="35" cy="72" rx="2.5" ry="1.5" fill="#6B8B3A" transform="rotate(-25,35,72)"/>
  <ellipse cx="32" cy="70" rx="2.5" ry="1.5" fill="#7A9B48"/>
  <ellipse cx="28" cy="73" rx="2.5" ry="1.4" fill="#6B8B3A" transform="rotate(-15,28,73)"/>
  <!-- Right sub -->
  <ellipse cx="65" cy="72" rx="2.5" ry="1.5" fill="#6B8B3A" transform="rotate(25,65,72)"/>
  <ellipse cx="68" cy="70" rx="2.5" ry="1.5" fill="#7A9B48"/>
  <ellipse cx="72" cy="73" rx="2.5" ry="1.4" fill="#6B8B3A" transform="rotate(15,72,73)"/>
  <!-- Center upright branches -->
  <ellipse cx="43" cy="75" rx="2.5" ry="1.5" fill="#6B8B3A" transform="rotate(-10,43,75)"/>
  <ellipse cx="42" cy="70" rx="2.5" ry="1.5" fill="#7A9B48" transform="rotate(-15,42,70)"/>
  <ellipse cx="43" cy="65" rx="2.5" ry="1.5" fill="#6B8B3A" transform="rotate(-10,43,65)"/>
  <ellipse cx="57" cy="75" rx="2.5" ry="1.5" fill="#6B8B3A" transform="rotate(10,57,75)"/>
  <ellipse cx="58" cy="70" rx="2.5" ry="1.5" fill="#7A9B48" transform="rotate(15,58,70)"/>
  <ellipse cx="57" cy="65" rx="2.5" ry="1.5" fill="#6B8B3A" transform="rotate(10,57,65)"/>
  <!-- Extra fill leaves -->
  <ellipse cx="45" cy="80" rx="2.5" ry="1.4" fill="#7A9B48" transform="rotate(-5,45,80)"/>
  <ellipse cx="55" cy="80" rx="2.5" ry="1.4" fill="#7A9B48" transform="rotate(5,55,80)"/>
  <ellipse cx="38" cy="66" rx="2.2" ry="1.3" fill="#6B8B3A" transform="rotate(-20,38,66)"/>
  <ellipse cx="62" cy="66" rx="2.2" ry="1.3" fill="#6B8B3A" transform="rotate(20,62,66)"/>
  <ellipse cx="36" cy="69" rx="2.2" ry="1.3" fill="#7A9B48" transform="rotate(-15,36,69)"/>
  <ellipse cx="64" cy="69" rx="2.2" ry="1.3" fill="#7A9B48" transform="rotate(15,64,69)"/>
  <ellipse cx="32" cy="67" rx="2" ry="1.3" fill="#6B8B3A"/>
  <ellipse cx="68" cy="67" rx="2" ry="1.3" fill="#6B8B3A"/>

  <!-- Tiny pink flower clusters at branch tips -->
  <!-- Left tip -->
  <circle cx="26" cy="73" r="3.5" fill="#C87090" opacity="0.9"/>
  <circle cx="26" cy="73" r="2" fill="#E090B0"/>
  <circle cx="25" cy="72" r="0.8" fill="#F0A8C0"/>
  <circle cx="27" cy="72" r="0.8" fill="#F0A8C0"/>
  <circle cx="26" cy="74" r="0.8" fill="#F0A8C0"/>

  <!-- Right tip -->
  <circle cx="74" cy="73" r="3.5" fill="#C87090" opacity="0.9"/>
  <circle cx="74" cy="73" r="2" fill="#E090B0"/>
  <circle cx="73" cy="72" r="0.8" fill="#F0A8C0"/>
  <circle cx="75" cy="72" r="0.8" fill="#F0A8C0"/>
  <circle cx="74" cy="74" r="0.8" fill="#F0A8C0"/>

  <!-- Center upright tips -->
  <circle cx="42" cy="60" r="3" fill="#C87090" opacity="0.9"/>
  <circle cx="42" cy="60" r="1.8" fill="#E090B0"/>
  <circle cx="58" cy="59" r="3" fill="#C87090" opacity="0.9"/>
  <circle cx="58" cy="59" r="1.8" fill="#E090B0"/>

  <!-- Left cluster tip -->
  <circle cx="32" cy="66" r="2.5" fill="#D47898" opacity="0.9"/>
  <circle cx="32" cy="66" r="1.5" fill="#E090B0"/>
  <!-- Right cluster tip -->
  <circle cx="68" cy="66" r="2.5" fill="#D47898" opacity="0.9"/>
  <circle cx="68" cy="66" r="1.5" fill="#E090B0"/>

  <!-- Tiny center buds at top center -->
  <circle cx="50" cy="58" r="2.5" fill="#C87090" opacity="0.9"/>
  <circle cx="50" cy="58" r="1.5" fill="#E090B0"/>
  <circle cx="47" cy="60" r="1.8" fill="#D47898" opacity="0.8"/>
  <circle cx="53" cy="60" r="1.8" fill="#D47898" opacity="0.8"/>

  <!-- Ground cover base -->
  <ellipse cx="50" cy="88" rx="20" ry="4" fill="#6B8B3A" opacity="0.3"/>
  <ellipse cx="50" cy="90" rx="16" ry="3" fill="#8B6914" opacity="0.25"/>
</svg>
