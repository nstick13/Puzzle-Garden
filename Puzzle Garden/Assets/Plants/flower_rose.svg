  <path d="M50 47 C47 45 48 42 50 41Z" fill="#E89898"/>
  <path d="M50 47 C53 45 52 42 50 41Z" fill="#F0A8A0"/>

  <!-- Center stamens -->
  <circle cx="50" cy="42" r="3" fill="#E8C84A"/>
  <circle cx="50" cy="42" r="2" fill="#F0D060"/>
  <circle cx="49" cy="41" r="0.8" fill="#C8A030"/>
  <circle cx="51" cy="41" r="0.8" fill="#C8A030"/>
  <circle cx="50" cy="43" r="0.8" fill="#C8A030"/>

  <!-- Ground soil -->
