<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rose — Full Bloom Cottage Style — Tier 2 Flower -->

  <!-- Stem -->
  <path d="M50 90 C50 85 50 75 50 62" stroke="#4A3520" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Side stems to leaves -->
  <path d="M50 80 C44 77 38 78 34 83" stroke="#5C8A4A" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 75 C56 72 63 73 67 78" stroke="#5C8A4A" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 68 C44 65 38 63 35 67" stroke="#5C8A4A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Thorns -->
  <path d="M50 78 L46 75" stroke="#8B5C30" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 71 L54 68" stroke="#8B5C30" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Leaves (compound, slightly serrated) -->
  <!-- Bottom-left leaf cluster -->
  <path d="M50 80 C44 77 36 76 34 81 C37 77 44 78 50 80Z" fill="#5C8A4A"/>
  <path d="M34 81 C35 78 38 77 40 80 C38 80 35 81 34 81Z" fill="#4A7A3A" opacity="0.7"/>
  <path d="M38 83 C37 81 34 81 32 83 C33 81 36 80 38 83Z" fill="#5C8A4A"/>
  <!-- Mid-right leaf cluster -->
  <path d="M50 75 C56 72 64 71 67 76 C64 73 56 73 50 75Z" fill="#5C8A4A"/>
  <path d="M67 76 C66 73 63 72 61 75 C63 75 66 76 67 76Z" fill="#4A7A3A" opacity="0.7"/>
  <!-- Upper-left leaf -->
  <path d="M50 68 C44 65 37 63 35 67 C38 64 44 66 50 68Z" fill="#6B9B4A"/>
  <path d="M35 67 C36 64 39 63 41 66Z" fill="#5C8A4A"/>

  <!-- Leaf veins -->
  <path d="M34 81 L44 78 L50 80" stroke="#4A7A3A" stroke-width="0.7" opacity="0.5"/>
  <path d="M67 76 L57 73 L50 75" stroke="#4A7A3A" stroke-width="0.7" opacity="0.5"/>

  <!-- Sepals (green base of bloom) -->
  <path d="M50 62 C46 60 43 56 45 52 C47 56 48 60 50 62Z" fill="#5C8A4A"/>
  <path d="M50 62 C54 60 57 56 55 52 C53 56 52 60 50 62Z" fill="#5C8A4A"/>
  <path d="M50 62 C48 58 47 54 50 50 C53 54 52 58 50 62Z" fill="#6B9B4A"/>
  <path d="M50 62 C44 60 40 56 42 51 C44 55 46 60 50 62Z" fill="#5C8A4A" opacity="0.7"/>
  <path d="M50 62 C56 60 60 56 58 51 C56 55 54 60 50 62Z" fill="#5C8A4A" opacity="0.7"/>

  <!-- Rose bloom — layered petals outward to in -->
  <!-- Outermost petal ring -->
  <path d="M50 55 C44 52 38 48 38 42 C38 36 44 34 48 38 C46 34 48 28 50 26 C52 28 54 34 52 38 C56 34 62 36 62 42 C62 48 56 52 50 55Z" fill="#C06070"/>
  <!-- Outer petals (5) -->
  <path d="M50 55 C47 50 40 48 38 42 C44 46 48 50 50 55Z" fill="#B85060"/>
  <path d="M50 55 C53 50 60 48 62 42 C56 46 52 50 50 55Z" fill="#C06070"/>
  <path d="M50 55 C50 48 52 40 50 34 C48 40 50 48 50 55Z" fill="#C86878"/>
  <path d="M50 55 C45 52 40 44 40 38 C42 44 46 52 50 55Z" fill="#B85060"/>
  <path d="M50 55 C55 52 60 44 60 38 C58 44 54 52 50 55Z" fill="#C06070"/>

  <!-- Mid petal ring -->
  <path d="M50 52 C46 48 42 44 42 40 C42 36 46 35 48 38 C48 35 50 32 50 30 C50 32 52 35 52 38 C54 35 58 36 58 40 C58 44 54 48 50 52Z" fill="#D4847A"/>
  <path d="M50 52 C48 47 44 44 42 40 C45 44 48 48 50 52Z" fill="#C87070"/>
  <path d="M50 52 C52 47 56 44 58 40 C55 44 52 48 50 52Z" fill="#D4847A"/>
  <path d="M50 52 C50 46 51 40 50 36 C49 40 50 46 50 52Z" fill="#D88888"/>

  <!-- Inner petal ring -->
  <path d="M50 49 C47 46 45 42 46 39 C47 37 49 36 50 38 C51 36 53 37 54 39 C55 42 53 46 50 49Z" fill="#E89898"/>
  <path d="M50 49 C48 46 46 43 47 40 C48 38 49 38 50 40Z" fill="#D88080"/>
  <path d="M50 49 C52 46 54 43 53 40 C52 38 51 38 50 40Z" fill="#E89898"/>

  <!-- Center petals (innermost) -->
