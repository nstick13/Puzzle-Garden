<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Daily Special Marker — Golden Sun Star Badge -->
  <!-- Outer warm glow -->
  <circle cx="50" cy="50" r="42" fill="#F0C820" opacity="0.12"/>
  <circle cx="50" cy="50" r="36" fill="#E8B818" opacity="0.15"/>
  <!-- Sun rays — 8 long alternating with 8 short -->
  <!-- Long rays (cardinal + diagonal) -->
  <path d="M50 50 L50 7" stroke="#D4A010" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L50 93" stroke="#D4A010" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L7 50" stroke="#D4A010" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L93 50" stroke="#D4A010" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L20 20" stroke="#E0B018" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L80 20" stroke="#E0B018" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L20 80" stroke="#E0B018" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L80 80" stroke="#E0B018" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Short rays (between cardinal and diagonal) -->
  <path d="M50 50 L34 12" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L66 12" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L88 34" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L88 66" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L66 88" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L34 88" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L12 66" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 50 L12 34" stroke="#ECC828" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Main disc — warm golden -->
  <circle cx="50" cy="50" r="26" fill="#D4A010"/>
  <circle cx="50" cy="50" r="24" fill="#E8BC20"/>
  <circle cx="50" cy="50" r="21" fill="#D4A010"/>
  <circle cx="50" cy="50" r="19" fill="#F0CC30"/>
  <!-- Star shape in center (five-pointed, warm amber) -->
  <path d="M50 31 L53 44 L66 44 L56 52 L59 65 L50 57 L41 65 L44 52 L34 44 L47 44 Z" fill="#C08010"/>
  <path d="M50 31 L53 44 L66 44 L56 52 L59 65 L50 57 L41 65 L44 52 L34 44 L47 44 Z" fill="#E0A820" opacity="0.7"/>
  <!-- Star highlight (top facet lit) -->
  <path d="M50 33 L52.5 43 L50 40 L47.5 43 Z" fill="#F8E860" opacity="0.75"/>
  <!-- Warm terracotta accent dots around inner ring -->
  <circle cx="50" cy="29" r="2.2" fill="#B85C30" opacity="0.75"/>
  <circle cx="50" cy="71" r="2.2" fill="#B85C30" opacity="0.75"/>
  <circle cx="29" cy="50" r="2.2" fill="#B85C30" opacity="0.75"/>
  <circle cx="71" cy="50" r="2.2" fill="#B85C30" opacity="0.75"/>
  <circle cx="35" cy="35" r="1.8" fill="#B85C30" opacity="0.6"/>
  <circle cx="65" cy="35" r="1.8" fill="#B85C30" opacity="0.6"/>
  <circle cx="35" cy="65" r="1.8" fill="#B85C30" opacity="0.6"/>
  <circle cx="65" cy="65" r="1.8" fill="#B85C30" opacity="0.6"/>
  <!-- Center shine -->
  <circle cx="44" cy="44" r="4" fill="#FFFCE8" opacity="0.65"/>
  <circle cx="45" cy="45" r="2" fill="white" opacity="0.45"/>
</svg>
